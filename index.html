<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klavier - Learn Piano</title>
    <meta name="description" content="A free, browser-based piano learning app. 18 interactive lessons, quizzes, a virtual keyboard, and song playback — all running locally in your browser with no account required." />

    <!-- Canonical URL (update when domain is live) -->
    <link rel="canonical" href="https://example.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Klavier - Learn Piano" />
    <meta property="og:description" content="A free, browser-based piano learning app with 18 interactive lessons, quizzes, and a virtual keyboard." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Klavier — Learn Piano in Your Browser" />
    <meta property="og:site_name" content="Klavier" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Klavier - Learn Piano" />
    <meta name="twitter:description" content="A free, browser-based piano learning app with 18 interactive lessons, quizzes, and a virtual keyboard." />
    <meta name="twitter:image" content="https://example.com/og-image.png" />
    <meta name="twitter:image:alt" content="Klavier — Learn Piano in Your Browser" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#3d3929" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Security headers (CSP, X-Frame-Options, etc.) are set server-side
         via public/_headers (Netlify/Cloudflare) or vercel.json (Vercel).
         A meta CSP tag here would conflict with Vite dev/preview modes and
         duplicate the server-side policy. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Klavier",
      "description": "A free, browser-based piano learning app with 18 interactive lessons, quizzes, a virtual keyboard, and song playback.",
      "url": "https://example.com/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with Web Audio API support",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "18 interactive piano lessons",
        "Virtual piano keyboard",
        "Music theory quizzes",
        "Song playback and practice",
        "Progress tracking",
        "No account required"
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Music&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
